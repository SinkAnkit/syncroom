services:
  - type: web
    name: syncroom-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://syncroom-ten.vercel.app,https://syncroom.vercel.app,http://localhost:3000
      - key: DATABASE_URL
        fromDatabase:
          name: syncroom-db
          property: connectionURI
    rootDir: backend

databases:
  - name: syncroom-db
    plan: free
